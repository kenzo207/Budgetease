name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: ./budgetease_flutter
        run: flutter pub get
      
      - name: Build APK
        working-directory: ./budgetease_flutter
        run: flutter build apk --release
      
      - name: Get version from pubspec
        id: version
        working-directory: ./budgetease_flutter
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Rename APK
        run: |
          cp budgetease_flutter/build/app/outputs/flutter-apk/app-release.apk \
             budgetease-v${{ steps.version.outputs.version }}.apk
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: Zolt v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## 📱 Zolt v${{ steps.version.outputs.version }}
            
            **Build automatique depuis la branche main**
            
            ### 📥 Installation
            1. Téléchargez le fichier APK ci-dessous
            2. Activez l'installation depuis des sources inconnues sur votre appareil Android
            3. Installez l'APK
            
            ### ℹ️ Informations
            - **Version**: ${{ steps.version.outputs.version }}
            - **Build**: #${{ github.run_number }}
            - **Commit**: ${{ github.sha }}
            - **Date**: ${{ github.event.head_commit.timestamp }}
            
            ---
            
            🔒 **Sécurité**: APK signé avec clés de debug (développement uniquement)
          draft: false
          prerelease: false
          files: |
            budgetease-v${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: budgetease-apk
          path: budgetease-v${{ steps.version.outputs.version }}.apk
          retention-days: 30
