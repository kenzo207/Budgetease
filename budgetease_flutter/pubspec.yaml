name: budgetease_flutter
description: Application de gestion budgétaire simple et locale pour le contexte africain
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  intl: ^0.18.1
  
  # Features
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.1.0
  csv: ^5.1.0
  share_plus: ^7.2.0
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

