name: budgetease_flutter
description: Application bancaire Local-First professionnelle et sécurisée
publish_to: 'none'

version: 4.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database (Drift avec chiffrement)
  drift: ^2.16.0
  sqlite3: ^2.1.0
  sqlcipher_flutter_libs: ^0.6.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Sécurité
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.1.0
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # SMS & Notifications (temporairement désactivé - problème Gradle namespace)
  # flutter_sms: ^2.3.3
  permission_handler: ^12.0.1
  flutter_local_notifications: ^17.0.0

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  intl: ^0.18.1
  shimmer: ^3.0.0

  # Utilitaires
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  csv: ^5.1.0
  share_plus: ^7.2.0

  # Icons
  cupertino_icons: ^1.0.8
  posthog_flutter: ^5.13.0
  flutter_sms_inbox: ^1.0.4
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.0
  drift_dev: ^2.16.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  
  # Linting
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/zolt_logo_prime.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
