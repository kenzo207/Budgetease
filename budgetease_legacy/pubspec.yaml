name: budgetease_flutter
description: Application de gestion budgétaire simple et locale pour le contexte africain
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0
  
  # Database (Phase 1) - Drift Migration
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.3.4
  
  # Security (Phase 1)
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  
  # Functional Programming (Phase 1)
  fpdart: ^1.1.0
  
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  intl: ^0.18.1
  
  # Features
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  permission_handler: ^11.1.0
  csv: ^5.1.0
  share_plus: ^7.2.0
  uuid: ^4.5.1
  
  # Icons
  cupertino_icons: ^1.0.8

  # Background Tasks & Widgets

  home_widget: ^0.6.0
  
  # Animations (Phase 4) - Temporarily disabled for build
  # rive: ^0.13.16
  # flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.16.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1

  # Hive (Replacement for Isar - Option D)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

flutter:
  uses-material-design: true

  assets:

